name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            ext: ""
            archive: tar.gz
          - name: linux-aarch64
            os: ubuntu-22.04-arm
            ext: ""
            archive: tar.gz
          - name: macos-aarch64
            os: macos-15
            ext: ""
            archive: tar.gz
          - name: windows-x86_64
            os: windows-2022
            ext: ".exe"
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.name }}

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libudev-dev libx11-dev libxcursor-dev \
            libxinerama-dev libxrandr-dev libxi-dev libgl1-mesa-dev

      - name: Install Windows zlib for freetype-sys
        # See ci.yml for context. freetype-sys 0.23.0 bundled build
        # needs zlib.h on the cl include path.
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install zlib:x64-windows-static-md
          echo "CFLAGS_x86_64_pc_windows_msvc=-IC:\vcpkg\installed\x64-windows-static-md\include" `
            | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build
        run: cargo build --release --locked

      - name: Resolve version
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stage archive contents
        shell: bash
        run: |
          mkdir -p staging
          cp "target/release/usagi${{ matrix.ext }}" staging/
          cp UNLICENSE THIRD_PARTY_LICENSES.md staging/

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist
          archive="usagi-${{ steps.ver.outputs.version }}-${{ matrix.name }}.tar.gz"
          tar -czf "dist/$archive" -C staging .
          (cd dist && (sha256sum "$archive" 2>/dev/null || shasum -a 256 "$archive") > "$archive.sha256")

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          mkdir -p dist
          archive="usagi-${{ steps.ver.outputs.version }}-${{ matrix.name }}.zip"
          (cd staging && 7z a -tzip "../dist/$archive" .)
          (cd dist && (sha256sum "$archive" 2>/dev/null || shasum -a 256 "$archive") > "$archive.sha256")

      - uses: actions/upload-artifact@v4
        with:
          name: usagi-${{ matrix.name }}
          path: dist/*

  build-web:
    name: build (wasm)
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-emscripten

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-wasm

      - uses: mymindstorm/setup-emsdk@v14
        with:
          # Pinned: `latest` started shipping a wasm-opt whose --asyncify pass
          # fails ("__asyncify_get_call_index does not exist") on wasm built
          # with -fwasm-exceptions. We need both. 5.0.6 is the version
          # documented as verified in DEVELOPING.md.
          version: 5.0.6
          actions-cache-folder: emsdk-cache

      - name: Build
        env:
          EMCC_CFLAGS: -fwasm-exceptions -sSUPPORT_LONGJMP=wasm -s USE_LIBPNG=1 -s USE_OGG=1 -s USE_VORBIS=1
        run: cargo build --release --locked --target wasm32-unknown-emscripten

      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package
        # Bundle shell.html alongside the wasm runtime so `usagi export
        # --target wasm` against a downloaded template has every file it
        # needs without falling back to anywhere else.
        run: |
          mkdir -p dist
          archive="usagi-${{ steps.ver.outputs.version }}-wasm.tar.gz"
          cp web/shell.html target/wasm32-unknown-emscripten/release/
          cp UNLICENSE THIRD_PARTY_LICENSES.md target/wasm32-unknown-emscripten/release/
          tar -czf "dist/$archive" \
            -C target/wasm32-unknown-emscripten/release \
            usagi.js usagi.wasm shell.html UNLICENSE THIRD_PARTY_LICENSES.md
          (cd dist && (sha256sum "$archive" 2>/dev/null || shasum -a 256 "$archive") > "$archive.sha256")

      - uses: actions/upload-artifact@v4
        with:
          name: usagi-wasm
          path: dist/*

  publish:
    name: publish
    needs: [build, build-web]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: false
          # Created as a draft so the release can be reviewed (notes, attached
          # archives) before going public.
          draft: true
          # Tags with a hyphen (e.g. v0.1.0-dev.1) follow semver prerelease
          # convention and are flagged as such on GitHub.
          prerelease: ${{ contains(github.ref_name, '-') }}
